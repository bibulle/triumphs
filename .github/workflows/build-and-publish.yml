name: Build and Publish

on:
  push:
    branches:
      - 'main'
  pull_request:

env:
  APP_NAME: triumph-tracker
  VERSION: 0.0.0
  APP_PATH: ./application
  OPS_PATH: ./gitops
  K8S_FILE: triumph-tracker/30-deployment.yaml

jobs:
  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build for E2E
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Build & Push Docker ─────────────────────────────────────────────────────
  build-and-push-docker-image:
    name: Build Docker image and push to repositories
    needs: test
    runs-on: ubuntu-latest

    env:
      actions_token: ${{ secrets.ACTIONS_TOKEN }}
      dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub_password: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: ${{ env.APP_PATH }}

      - name: Checkout gitops
        uses: actions/checkout@v4
        if: ${{ env.actions_token != '' }}
        with:
          repository: bibulle/myKubernetesConfig
          token: ${{ env.actions_token }}
          path: ${{ env.OPS_PATH }}

      - name: Read package.json
        id: read_package_json
        run: |
          echo "PACKAGE_JSON=$(jq -c . < ${{ env.APP_PATH }}/package.json)" >> $GITHUB_ENV

      - name: Retrieve version from package.json
        run: |
          echo "VERSION=${{ fromJson(env.PACKAGE_JSON).version }}" >> $GITHUB_ENV

      - name: Calculate docker tags (with DockerHub credentials)
        if: ${{ env.dockerhub_username != '' && env.dockerhub_password != '' }}
        run: |
          echo "DOCKER_TAGS=${{ env.dockerhub_username }}/${{ env.APP_NAME }}:latest,${{ env.dockerhub_username }}/${{ env.APP_NAME }}:V${{ env.VERSION }}" >> $GITHUB_ENV

      - name: Calculate docker tags (without credentials)
        if: ${{ env.dockerhub_username == '' || env.dockerhub_password == '' }}
        run: |
          echo "DOCKER_TAGS=${{ env.APP_NAME }}:latest" >> $GITHUB_ENV

      - name: Print build info
        run: echo "Building ${{ env.APP_NAME }}:${{ env.VERSION }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        if: ${{ env.dockerhub_username != '' && env.dockerhub_password != '' }}
        with:
          username: ${{ env.dockerhub_username }}
          password: ${{ env.dockerhub_password }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_PATH }}
          push: ${{ env.dockerhub_username != '' && env.dockerhub_password != '' }}
          tags: ${{ env.DOCKER_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update k8s yaml file
        id: update_yml
        if: ${{ env.actions_token != '' }}
        run: |
          cd ${{ env.OPS_PATH }}
          image="bibulle\/${{ env.APP_NAME }}"
          sed -i "s/image: ${image}:.*/image: ${image}:V${{ env.VERSION }}/g" ${{ env.K8S_FILE }}
          status=$(git status -s | wc -l)
          echo "line_modified=$status" >> $GITHUB_OUTPUT

      - name: Commit k8s yaml file
        if: ${{ env.actions_token != '' && steps.update_yml.outputs.line_modified != '0' }}
        run: |
          cd ${{ env.OPS_PATH }}
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global user.name "${GITHUB_ACTOR}"
          git add .
          git commit -am "Update version of ${{ env.APP_NAME }} (${{ env.VERSION }})"
          git push
