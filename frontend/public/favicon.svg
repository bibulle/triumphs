<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hair (white/light, spiky top) -->
  <g fill="#eeeeee" stroke="#aaaaaa" stroke-width="0.6">
    <ellipse cx="32" cy="13" rx="16" ry="7" />
    <polygon points="14,16 10,3 20,13" />
    <polygon points="21,9 20,1 27,10" />
    <polygon points="32,7 32,0 37,8" />
    <polygon points="43,9 44,1 37,10" />
    <polygon points="50,16 54,3 44,13" />
  </g>

  <!-- Face -->
  <circle cx="32" cy="38" r="21" fill="#ffd993" stroke="#c8883a" stroke-width="1.5" />

  <!-- Left eye X -->
  <g stroke="#222" stroke-width="3" stroke-linecap="round">
    <line x1="21" y1="30" x2="27" y2="36" />
    <line x1="27" y1="30" x2="21" y2="36" />
  </g>

  <!-- Right eye X -->
  <g stroke="#222" stroke-width="3" stroke-linecap="round">
    <line x1="37" y1="30" x2="43" y2="36" />
    <line x1="43" y1="30" x2="37" y2="36" />
  </g>

  <!-- Mouth open -->
  <path d="M 22 46 Q 32 56 42 46" fill="#c0392b" />
  <path d="M 22 46 Q 32 54 42 46" fill="#e74c3c" />

  <!-- Tongue -->
  <ellipse cx="32" cy="53" rx="5.5" ry="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1" />
  <line x1="32" y1="53" x2="32" y2="56" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round" />

  <!-- Cheek blush -->
  <ellipse cx="16" cy="43" rx="4" ry="2.5" fill="#ff9999" opacity="0.45" />
  <ellipse cx="48" cy="43" rx="4" ry="2.5" fill="#ff9999" opacity="0.45" />
</svg>
